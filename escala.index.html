<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Coroinhas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== ESTILOS (MANTIDOS) ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
        .container { max-width:1000px; margin:0 auto; background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
        .header { background:linear-gradient(135deg,#4a90e2,#2c3e50); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
        .logo { display:flex; align-items:center; gap:15px; }
        .logo i { font-size:2.5rem; }
        .logo h1 { font-size:1.8rem; font-weight:600; }
        .header-actions { display:flex; gap:10px; align-items:center; }
        .user-badge { background:rgba(255,255,255,0.2); padding:8px 15px; border-radius:20px; font-size:0.9rem; }
        .btn { padding:10px 20px; border:none; border-radius:8px; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:8px; background:white; color:#2c3e50; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .btn-primary { background:#4a90e2; color:white; }
        .btn-success { background:#28a745; color:white; }
        .btn-warning { background:#ffc107; color:#2c3e50; }
        .btn-danger { background:#dc3545; color:white; }
        .btn-sm { padding:5px 12px; font-size:0.8rem; }
        .main-content { padding:30px; }
        .controls { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; flex-wrap:wrap; gap:20px; }
        .month-selector { display:flex; align-items:center; gap:20px; }
        .month-selector h2 { font-size:1.5rem; color:#2c3e50; min-width:200px; text-align:center; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:30px; }
        .calendar-day { background:white; border:2px solid #e0e0e0; border-radius:10px; padding:15px; text-align:center; cursor:pointer; transition:all 0.3s; min-height:80px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .calendar-day:hover { border-color:#4a90e2; transform:scale(1.02); box-shadow:0 5px 15px rgba(0,0,0,0.1); }
        .calendar-day.today { border-color:#ffc107; background:rgba(255,193,7,0.1); }
        .calendar-day .day-number { font-size:1.8rem; font-weight:700; color:#4a90e2; }
        .calendar-day .has-missa { display:inline-block; margin-top:5px; background:#28a745; color:white; padding:2px 8px; border-radius:10px; font-size:0.7rem; }
        .calendar-day .no-missa { color:#999; font-size:0.7rem; margin-top:5px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal.active { display:flex; }
        .modal-content { background:white; border-radius:20px; padding:30px; width:90%; max-width:600px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #e0e0e0; padding-bottom:10px; }
        .modal-header h3 { font-size:1.5rem; }
        .modal-close { background:none; border:none; font-size:2rem; cursor:pointer; color:#6c757d; }
        .missa-item { background:#f8f9fa; border-radius:10px; padding:15px; margin-bottom:15px; border-left:4px solid #4a90e2; }
        .missa-item .horario { font-weight:600; font-size:1.2rem; }
        .missa-item .local { color:#6c757d; font-size:0.9rem; }
        .missa-item .status { font-size:0.8rem; margin-top:5px; }
        .status-pendente { color:#ffc107; }
        .status-confirmado { color:#28a745; }
        .login-screen { min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
        .login-card { background:white; border-radius:20px; padding:40px; width:90%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
        .login-card i { font-size:4rem; color:#4a90e2; margin-bottom:20px; }
        .login-card h2 { margin-bottom:30px; }
        .login-btn { display:block; width:100%; padding:15px; margin:10px 0; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .login-btn.admin { background:#2c3e50; color:white; }
        .login-btn.coroinha { background:#4a90e2; color:white; }
        .login-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .toast-container { position:fixed; top:20px; right:20px; z-index:2000; }
        .toast { background:white; border-radius:8px; padding:15px 20px; margin-bottom:10px; box-shadow:0 10px 30px rgba(0,0,0,0.2); animation:slideInRight 0.3s; display:flex; align-items:center; gap:10px; }
        .toast.success { border-left:4px solid #28a745; }
        .toast.error { border-left:4px solid #dc3545; }
        .toast.info { border-left:4px solid #4a90e2; }
        @keyframes slideInRight { from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;} }
        .empty-state { text-align:center; padding:40px; color:#6c757d; }
        .login-coroinha-input { width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:8px; font-size:1rem; margin-bottom:15px; }
        @media (max-width:768px) { .calendar-grid { grid-template-columns:repeat(7,1fr); } .calendar-day { min-height:60px; padding:10px; } .calendar-day .day-number { font-size:1.2rem; } }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <i class="fas fa-church"></i>
            <h2>Escala de Coroinhas</h2>
            <p style="margin-bottom:20px;color:#6c757d;">Acesse como:</p>
            <button class="login-btn admin" onclick="showAdminLogin()">
                <i class="fas fa-lock"></i> Administrador
            </button>
            <button class="login-btn coroinha" onclick="showCoroinhaLogin()">
                <i class="fas fa-user"></i> Sou Coroinha
            </button>
            <div id="loginCoroinhaForm" style="display:none; margin-top:20px;">
                <input type="text" id="nomeCoroinhaLogin" class="login-coroinha-input" placeholder="Digite seu nome">
                <button class="login-btn coroinha" onclick="loginCoroinha()">Entrar</button>
            </div>
            <div id="loginAdminForm" style="display:none; margin-top:20px;">
                <input type="password" id="senhaAdmin" class="login-coroinha-input" placeholder="Senha">
                <button class="login-btn admin" onclick="loginAdmin()">Entrar</button>
            </div>
        </div>
    </div>

    <!-- SISTEMA -->
    <div class="container" id="mainSystem" style="display:none;">
        <header class="header">
            <div class="logo"><i class="fas fa-church"></i><h1>Escala</h1></div>
            <div class="header-actions">
                <span class="user-badge" id="userBadge"></span>
                <button class="btn btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>
        <main class="main-content">
            <div class="controls">
                <div class="month-selector">
                    <button class="btn btn-sm" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="currentMonth">Carregando...</h2>
                    <button class="btn btn-sm" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="adminActions" style="display:none;">
                    <button class="btn btn-success" id="generateScaleBtn"><i class="fas fa-magic"></i> Gerar Escala</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </main>
    </div>

    <!-- MODAL DO DIA -->
    <div class="modal" id="dayModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalDayTitle">Dia</h3>
                <button class="modal-close" onclick="closeDayModal()">&times;</button>
            </div>
            <div id="modalDayContent"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // BANCO DE DADOS (localStorage)
        // ============================================================
        const DB = {
            get(key) { return JSON.parse(localStorage.getItem(key) || '[]'); },
            set(key, value) { localStorage.setItem(key, JSON.stringify(value)); },
            coroinhas: {
                get() { return DB.get('coroinhas'); },
                set(v) { DB.set('coroinhas', v); }
            },
            horarios: {
                get() { return DB.get('horarios'); },
                set(v) { DB.set('horarios', v); }
            },
            disponibilidades: {
                get() { return DB.get('disponibilidades'); },
                set(v) { DB.set('disponibilidades', v); }
            },
            escalas: {
                get() { return DB.get('escalas'); },
                set(v) { DB.set('escalas', v); }
            }
        };

        // ============================================================
        // DADOS PADRÃO
        // ============================================================
        const HORARIOS_PADRAO = [
            { id:'h1', dia_semana:'domingo', horario:'08:00', local:'Paróquia São Benedito' },
            { id:'h2', dia_semana:'domingo', horario:'10:00', local:'Paróquia São Benedito' },
            { id:'h3', dia_semana:'domingo', horario:'20:00', local:'Paróquia São Benedito' },
            { id:'h4', dia_semana:'domingo', horario:'18:00', local:'Capela Santo Antônio e São Miguel Arcanjo' },
            { id:'h5', dia_semana:'terca', horario:'19:00', local:'Capela Santo Antônio e São Miguel Arcanjo' },
            { id:'h6', dia_semana:'quarta', horario:'19:00', local:'Paróquia São Benedito' },
            { id:'h7', dia_semana:'quinta', horario:'19:30', local:'Paróquia São Benedito' },
            { id:'h8', dia_semana:'sexta', horario:'19:00', local:'Paróquia São Benedito' },
            { id:'h9', dia_semana:'sabado', horario:'17:00', local:'Capela Nossa Senhora Rosa Mística' }
        ];

        // ============================================================
        // ESTADO
        // ============================================================
        let currentUser = null;        // 'admin' ou {id, nome}
        let currentDate = new Date();
        let coroinhaAtual = null;

        // ============================================================
        // LOGIN
        // ============================================================
        function showAdminLogin() {
            document.getElementById('loginAdminForm').style.display = 'block';
            document.getElementById('loginCoroinhaForm').style.display = 'none';
        }
        function showCoroinhaLogin() {
            document.getElementById('loginCoroinhaForm').style.display = 'block';
            document.getElementById('loginAdminForm').style.display = 'none';
        }

        function loginAdmin() {
            const senha = document.getElementById('senhaAdmin').value;
            if (senha === 'Jesus') {
                currentUser = 'admin';
                entrarSistema('admin');
            } else {
                showToast('Senha incorreta!', 'error');
            }
        }

        function loginCoroinha() {
            const nome = document.getElementById('nomeCoroinhaLogin').value.trim();
            if (!nome) { showToast('Digite seu nome!', 'error'); return; }
            let coroinhas = DB.coroinhas.get();
            let coroinha = coroinhas.find(c => c.nome.toLowerCase() === nome.toLowerCase());
            if (!coroinha) {
                coroinha = { id: Date.now().toString(), nome, ativo: true };
                coroinhas.push(coroinha);
                DB.coroinhas.set(coroinhas);
                showToast('Coroinha criado!', 'success');
            } else if (!coroinha.ativo) {
                showToast('Inativo!', 'error');
                return;
            }
            currentUser = coroinha;
            coroinhaAtual = coroinha;
            entrarSistema('coroinha');
        }

        function entrarSistema(tipo) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainSystem').style.display = 'block';
            if (tipo === 'admin') {
                document.getElementById('userBadge').innerHTML = '<i class="fas fa-lock"></i> Administrador';
                document.getElementById('adminActions').style.display = 'block';
            } else {
                document.getElementById('userBadge').innerHTML = `<i class="fas fa-user"></i> ${currentUser.nome}`;
                document.getElementById('adminActions').style.display = 'none';
            }
            renderizarCalendario();
        }

        function logout() {
            currentUser = null;
            coroinhaAtual = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainSystem').style.display = 'none';
        }

        // ============================================================
        // CALENDÁRIO
        // ============================================================
        function renderizarCalendario() {
            const grid = document.getElementById('calendarGrid');
            const mes = currentDate.getMonth() + 1;
            const ano = currentDate.getFullYear();
            const hoje = new Date();
            const primeiroDia = new Date(ano, mes-1, 1).getDay();
            const diasNoMes = new Date(ano, mes, 0).getDate();

            const escalas = DB.escalas.get().filter(e => e.mes === mes && e.ano === ano);
            // Só conta confirmados para exibir o número de missas no dia
            const confirmados = escalas.filter(e => e.status === 'confirmado');
            const porDia = {};
            confirmados.forEach(e => {
                const key = e.data_escala;
                porDia[key] = (porDia[key] || 0) + 1;
            });

            let html = '';
            const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
            for (let i=0; i<7; i++) {
                html += `<div style="font-weight:600;text-align:center;padding:5px;color:#6c757d;">${diasSemana[i]}</div>`;
            }
            for (let i=0; i<primeiroDia; i++) {
                html += `<div></div>`;
            }
            for (let dia=1; dia<=diasNoMes; dia++) {
                const data = new Date(ano, mes-1, dia);
                const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                const isToday = data.toDateString() === hoje.toDateString();
                const count = porDia[dataStr] || 0;
                html += `
                    <div class="calendar-day ${isToday?'today':''}" onclick="abrirDia('${dataStr}')">
                        <div class="day-number">${dia}</div>
                        ${count > 0 ? `<div class="has-missa">${count} coroinhas</div>` : `<div class="no-missa">-</div>`}
                    </div>
                `;
            }
            grid.innerHTML = html;
            updateMonthDisplay();
        }

        function updateMonthDisplay() {
            const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            document.getElementById('currentMonth').textContent = `${meses[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        }

        function prevMonth() {
            const hoje = new Date();
            const mesAtual = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            if (currentDate <= mesAtual) { showToast('Não pode ver meses anteriores!', 'error'); return; }
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderizarCalendario();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderizarCalendario();
        }

        // ============================================================
        // MODAL DO DIA
        // ============================================================
        function abrirDia(dataStr) {
            const modal = document.getElementById('dayModal');
            const title = document.getElementById('modalDayTitle');
            const content = document.getElementById('modalDayContent');

            const [ano, mes, dia] = dataStr.split('-').map(Number);
            const data = new Date(ano, mes-1, dia);
            const diaSemana = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'][data.getDay()];
            const nomeDia = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][data.getDay()];
            title.textContent = `${nomeDia}, ${dia}/${mes}/${ano}`;

            let horarios = DB.horarios.get();
            let horariosDoDia = horarios.filter(h => h.dia_semana === diaSemana);
            if (diaSemana === 'sexta' && dia <= 7) {
                horariosDoDia.push({
                    id: 'extra',
                    dia_semana: 'sexta',
                    horario: '08:00',
                    local: 'Paróquia São Benedito (1ª Sexta)'
                });
            }

            const todasEscalas = DB.escalas.get();
            const escalasDoDia = todasEscalas.filter(e => e.data_escala === dataStr);

            let html = '';
            if (horariosDoDia.length === 0) {
                html = '<div class="empty-state"><i class="fas fa-clock"></i><p>Nenhum horário de missa neste dia.</p></div>';
            } else {
                for (const h of horariosDoDia) {
                    // Escalas para este horário/local
                    const escalasHorario = escalasDoDia.filter(e => e.horario === h.horario && e.local === h.local);
                    const confirmados = escalasHorario.filter(e => e.status === 'confirmado');
                    const pendentes = escalasHorario.filter(e => e.status === 'pendente');

                    const isAdmin = (currentUser === 'admin');
                    const isCoroinha = (currentUser !== 'admin' && currentUser !== null);
                    const coroinhaId = currentUser?.id;

                    let statusHtml = '';
                    let acoesHtml = '';

                    // Verifica se o coroinha atual já está confirmado ou pendente neste horário
                    const minhaConfirmacao = confirmados.find(e => e.coroinha_id === coroinhaId);
                    const minhaPendencia = pendentes.find(e => e.coroinha_id === coroinhaId);

                    if (isAdmin) {
                        // Admin vê todos os confirmados e pendentes
                        if (confirmados.length > 0) {
                            const nomesConfirmados = confirmados.map(e => e.coroinha_nome).join(', ');
                            statusHtml += `<div class="status status-confirmado"><i class="fas fa-check-circle"></i> Confirmados: ${nomesConfirmados}</div>`;
                        }
                        if (pendentes.length > 0) {
                            const nomesPendentes = pendentes.map(e => e.coroinha_nome).join(', ');
                            statusHtml += `<div class="status status-pendente"><i class="fas fa-hourglass-half"></i> Pendentes: ${nomesPendentes}</div>`;
                            // Admin pode confirmar ou recusar cada pendente individualmente
                            pendentes.forEach(p => {
                                acoesHtml += `
                                    <button class="btn btn-sm btn-success" onclick="confirmarEscala('${p.id}')"><i class="fas fa-check"></i> Confirmar ${p.coroinha_nome}</button>
                                    <button class="btn btn-sm btn-danger" onclick="recusarEscala('${p.id}')"><i class="fas fa-times"></i> Recusar ${p.coroinha_nome}</button>
                                `;
                            });
                        }
                        if (confirmados.length === 0 && pendentes.length === 0) {
                            statusHtml = `<div class="status">Sem coroinhas</div>`;
                        }
                    } else if (isCoroinha) {
                        // Coroinha vê apenas sua própria situação
                        if (minhaConfirmacao) {
                            statusHtml = `<div class="status status-confirmado"><i class="fas fa-check-circle"></i> Você está confirmado</div>`;
                            acoesHtml = `<button class="btn btn-sm btn-danger" onclick="cancelarConfirmacao('${minhaConfirmacao.id}')">Cancelar</button>`;
                        } else if (minhaPendencia) {
                            statusHtml = `<div class="status status-pendente"><i class="fas fa-hourglass-half"></i> Aguardando confirmação</div>`;
                            acoesHtml = `<button class="btn btn-sm btn-danger" onclick="cancelarOferta('${minhaPendencia.id}')">Cancelar oferta</button>`;
                        } else {
                            statusHtml = `<div class="status">Vago</div>`;
                            acoesHtml = `<button class="btn btn-sm btn-primary" onclick="oferecerCoroinha('${dataStr}','${h.horario}','${h.local}')">Quero servir</button>`;
                        }
                    }

                    html += `
                        <div class="missa-item">
                            <div class="horario">${h.horario}</div>
                            <div class="local"><i class="fas fa-church"></i> ${h.local}</div>
                            ${statusHtml}
                            <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;">
                                ${acoesHtml}
                            </div>
                        </div>
                    `;
                }
            }

            if (currentUser === 'admin') {
                html += `
                    <div style="margin-top:20px;text-align:right;">
                        <button class="btn btn-danger btn-sm" onclick="limparDia('${dataStr}')"><i class="fas fa-trash"></i> Limpar todas as escalas deste dia</button>
                    </div>
                `;
            }

            content.innerHTML = html;
            modal.classList.add('active');
        }

        function closeDayModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        // ============================================================
        // AÇÕES DE COROINHA
        // ============================================================
        function oferecerCoroinha(dataStr, horario, local) {
            if (!coroinhaAtual) { showToast('Erro: coroinha não identificado', 'error'); return; }
            const [ano, mes] = dataStr.split('-').map(Number);
            let escalas = DB.escalas.get();
            // Verifica se já existe oferta ou confirmação para este coroinha neste horário
            const existente = escalas.find(e => e.data_escala === dataStr && e.horario === horario && e.local === local && e.coroinha_id === coroinhaAtual.id);
            if (existente) {
                showToast('Você já está nessa missa!', 'error');
                return;
            }
            const novaEscala = {
                id: Date.now().toString() + Math.random(),
                mes: mes,
                ano: ano,
                data_escala: dataStr,
                horario: horario,
                local: local,
                coroinha_id: coroinhaAtual.id,
                coroinha_nome: coroinhaAtual.nome,
                status: 'pendente',
                funcao: 'Coroinha'
            };
            escalas.push(novaEscala);
            DB.escalas.set(escalas);
            showToast('Oferta registrada! Aguardando confirmação.', 'success');
            abrirDia(dataStr);
            renderizarCalendario();
        }

        function cancelarOferta(escalaId) {
            if (!confirm('Cancelar sua oferta?')) return;
            let escalas = DB.escalas.get();
            escalas = escalas.filter(e => e.id !== escalaId);
            DB.escalas.set(escalas);
            showToast('Oferta cancelada.', 'success');
            const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
            if (dataStr) abrirDia(dataStr);
            renderizarCalendario();
        }

        function cancelarConfirmacao(escalaId) {
            if (!confirm('Cancelar sua confirmação?')) return;
            let escalas = DB.escalas.get();
            escalas = escalas.filter(e => e.id !== escalaId);
            DB.escalas.set(escalas);
            showToast('Você foi removido da missa.', 'success');
            const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
            if (dataStr) abrirDia(dataStr);
            renderizarCalendario();
        }

        // ============================================================
        // AÇÕES DE ADMIN
        // ============================================================
        function confirmarEscala(escalaId) {
            let escalas = DB.escalas.get();
            const escala = escalas.find(e => e.id === escalaId);
            if (!escala) { showToast('Escala não encontrada', 'error'); return; }
            escala.status = 'confirmado';
            DB.escalas.set(escalas);
            showToast('Escala confirmada!', 'success');
            const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
            if (dataStr) abrirDia(dataStr);
            renderizarCalendario();
        }

        function recusarEscala(escalaId) {
            if (!confirm('Recusar esta oferta?')) return;
            let escalas = DB.escalas.get();
            escalas = escalas.filter(e => e.id !== escalaId);
            DB.escalas.set(escalas);
            showToast('Oferta recusada.', 'success');
            const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
            if (dataStr) abrirDia(dataStr);
            renderizarCalendario();
        }

        function limparDia(dataStr) {
            if (!confirm(`Limpar todas as escalas deste dia?`)) return;
            let escalas = DB.escalas.get();
            escalas = escalas.filter(e => e.data_escala !== dataStr);
            DB.escalas.set(escalas);
            showToast('Dia limpo!', 'success');
            abrirDia(dataStr);
            renderizarCalendario();
        }

        // ============================================================
        // GERAR ESCALA AUTOMÁTICA (admin)
        // ============================================================
        function generateScale() {
            if (currentUser !== 'admin') {
                showToast('Apenas administradores podem gerar escala!', 'error');
                return;
            }
            const mes = currentDate.getMonth() + 1;
            const ano = currentDate.getFullYear();

            let horarios = DB.horarios.get();
            if (horarios.length === 0) { showToast('Cadastre horários primeiro!', 'error'); return; }

            const disponibilidades = DB.disponibilidades.get().filter(d => d.mes === mes && d.ano === ano);
            if (disponibilidades.length === 0) { showToast('Nenhum coroinha respondeu disponibilidade!', 'error'); return; }

            const coroinhas = DB.coroinhas.get().filter(c => c.ativo);
            if (coroinhas.length === 0) { showToast('Nenhum coroinha ativo!', 'error'); return; }

            // Expandir horários com primeira sexta
            let horariosExpandidos = horarios.map(h => ({ ...h }));
            const diasNoMes = new Date(ano, mes, 0).getDate();
            for (let dia=1; dia<=diasNoMes; dia++) {
                const data = new Date(ano, mes-1, dia);
                if (data.getDay() === 5 && dia <= 7) {
                    horariosExpandidos.push({
                        id: 'extra-'+dia,
                        dia_semana: 'sexta',
                        horario: '08:00',
                        local: 'Paróquia São Benedito (1ª Sexta)'
                    });
                }
            }

            const novasEscalas = [];
            const usados = {};

            for (let dia=1; dia<=diasNoMes; dia++) {
                const data = new Date(ano, mes-1, dia);
                const diaSemana = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'][data.getDay()];
                const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                const horariosDoDia = horariosExpandidos.filter(h => h.dia_semana === diaSemana);

                for (const h of horariosDoDia) {
                    const disponiveis = disponibilidades.filter(d => {
                        const dispDia = d.disponibilidade?.[diaSemana] || [];
                        return dispDia.includes(h.horario);
                    });
                    if (disponiveis.length === 0) continue;
                    disponiveis.sort((a,b) => (usados[a.coroinha_id]||0) - (usados[b.coroinha_id]||0));
                    const escolhido = disponiveis[0];
                    const coroinha = coroinhas.find(c => c.id === escolhido.coroinha_id);
                    if (!coroinha) continue;

                    novasEscalas.push({
                        id: Date.now().toString()+Math.random(),
                        mes, ano,
                        data_escala: dataStr,
                        horario: h.horario,
                        local: h.local || '',
                        coroinha_id: coroinha.id,
                        coroinha_nome: coroinha.nome,
                        status: 'confirmado',
                        funcao: 'Coroinha'
                    });
                    usados[coroinha.id] = (usados[coroinha.id]||0)+1;
                }
            }

            if (novasEscalas.length === 0) { showToast('Nenhuma escala possível!', 'error'); return; }

            let todas = DB.escalas.get();
            todas = todas.filter(e => !(e.mes === mes && e.ano === ano));
            todas = [...todas, ...novasEscalas];
            DB.escalas.set(todas);
            renderizarCalendario();
            showToast(`Escala gerada! ${novasEscalas.length} missas`, 'success');
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            if (DB.horarios.get().length === 0) {
                DB.horarios.set(HORARIOS_PADRAO);
            }

            document.getElementById('prevMonth').addEventListener('click', prevMonth);
            document.getElementById('nextMonth').addEventListener('click', nextMonth);
            document.getElementById('generateScaleBtn').addEventListener('click', generateScale);

            document.getElementById('dayModal').addEventListener('click', function(e) {
                if (e.target === this) closeDayModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeDayModal();
            });

            updateMonthDisplay();
        });

        // ============================================================
        // UTILITÁRIOS
        // ============================================================
        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity='0';
                toast.style.transform='translateX(100%)';
                setTimeout(()=>toast.remove(),300);
            }, 3000);
        }

        // Expor funções globais
        window.showAdminLogin = showAdminLogin;
        window.showCoroinhaLogin = showCoroinhaLogin;
        window.loginAdmin = loginAdmin;
        window.loginCoroinha = loginCoroinha;
        window.logout = logout;
        window.abrirDia = abrirDia;
        window.closeDayModal = closeDayModal;
        window.oferecerCoroinha = oferecerCoroinha;
        window.cancelarOferta = cancelarOferta;
        window.cancelarConfirmacao = cancelarConfirmacao;
        window.confirmarEscala = confirmarEscala;
        window.recusarEscala = recusarEscala;
        window.limparDia = limparDia;
        window.generateScale = generateScale;
        window.prevMonth = prevMonth;
        window.nextMonth = nextMonth;
    </script>
</body>
</html>
